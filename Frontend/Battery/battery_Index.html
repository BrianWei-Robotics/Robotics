<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Station Dashboard</title>
    <link rel="stylesheet" href="battery_Style.css">
</head>
<body>
    <header>
        <div class="header-titles">
            <h1>Charging Station Monitor</h1>
            <p class="subtitle">Live Battery Health & Telemetry</p>
        </div>
        <button class="home-btn" onclick="window.location.href='/Frontend/index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Home
        </button>
    </header>

    <main>
        <section class="next-up-section">
            <h2>⚡ Next Up (Ready for Use)</h2>
            <div id="next-up-container">
                </div>
        </section>

        <section class="grid-section">
            <div class="section-header">
                <h2>All Station Batteries</h2>
                <button id="edit-order-btn" class="action-btn" onclick="toggleEditMode()">
                    ✏️ Edit Battery Order
                </button>
            </div>
            <div id="battery-grid" class="grid">
                </div>
        </section>
    </main>

    <script src="battery_Script.js"></script>
</body>
</html>
