<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutonDraw - FRC Path Planner</title>
  <link rel="stylesheet" href="auton_Draw_Style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>AutonDraw</h1>
      <p>Strategy & Autonomous Path Planner</p>
    </header>

    <div class="toolbar">

      <div class="tool-group">
        <button id="homeBtn" class="btn btn-home">Home</button>
      </div>
      
      <div class="tool-group">
        <button class="btn tool-btn active" data-tool="draw">✏️ Draw Path</button>
        <button class="btn tool-btn" data-tool="waypoint">📍 Waypoint</button>
      </div>

      <div class="tool-group">
        <button class="color-btn active" style="background-color: #ed1c24;" data-color="#ed1c24" title="Red Alliance"></button>
        <button class="color-btn" style="background-color: #0066b3;" data-color="#0066b3" title="Blue Alliance"></button>
        <button class="color-btn" style="background-color: #28a745;" data-color="#28a745" title="Green"></button>
        <button class="color-btn" style="background-color: #ffc107;" data-color="#ffc107" title="Yellow"></button>
        <button class="color-btn" style="background-color: #ffffff;" data-color="#ffffff" title="White"></button>
      </div>

      <div class="tool-group">
        <button class="btn" id="undoBtn">↩️ Undo</button>
        <button class="btn btn-clear" id="clearBtn">🗑️ Clear Field</button>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="fieldCanvas" width="800" height="400"></canvas>
    </div>
  </div>

  <script src="auton_Draw_Script.js"></script>
</body>
</html>
